[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"
  CI           = "false"

# SPA redirect — sends all routes to index.html so React Router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
